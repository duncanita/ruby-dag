name: deploy
description: "Build, test, deploy pipeline"

nodes:
  test:
    type: exec
    command: "echo 'Running tests...' && sleep 1 && echo 'Tests passed'"
    timeout: 120

  lint:
    type: exec
    command: "echo 'Linting...' && echo 'Clean'"
    timeout: 30

  build:
    type: exec
    command: "echo 'Building image...'"
    depends_on: [test, lint]
    timeout: 300

  push:
    type: exec
    command: "echo 'Pushing to registry...'"
    depends_on: [build]

  notify:
    type: exec
    command: "echo 'Deploy complete!'"
    depends_on: [push]
